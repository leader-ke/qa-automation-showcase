name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Tier 1: Fast gates — run on every push, block the rest if they fail
  # ─────────────────────────────────────────────────────────────────────────

  lint:
    name: Lint (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Format check
        run: npx prettier --check .

  unit:
    name: Unit tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  smoke:
    name: Smoke tests (fast gate)
    runs-on: ubuntu-latest
    # Smoke tests are the canary — if critical paths are broken there's no
    # value running the full regression suite. All other test jobs need this.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npm run test:smoke

  # ─────────────────────────────────────────────────────────────────────────
  # Tier 2: Full regression — runs after smoke passes
  # ─────────────────────────────────────────────────────────────────────────

  playwright:
    name: Playwright (API + Web UI)
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: npx playwright test --project=api

      - name: Run Web UI tests (Playwright)
        run: npx playwright test --project=web-playwright

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  cypress:
    name: Cypress (Web UI)
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npx cypress run

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

  accessibility:
    name: Accessibility (axe + keyboard)
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run accessibility tests
        run: npm run test:a11y

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: playwright-report/
          retention-days: 14

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Detect whether Linux baselines have been committed yet.
      # On first CI run there are only macOS baselines (-darwin.png).
      # Once a developer downloads the artifact from this job and commits
      # the -linux.png files, subsequent runs switch to regression mode.
      - name: Check for committed Linux baselines
        id: baselines
        run: |
          if find web/playwright/visual-baselines -name "*-linux.png" -print -quit | grep -q .; then
            echo "exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "exist=false" >> "$GITHUB_OUTPUT"
          fi

      # No baselines yet: generate them and always pass.
      # Download the uploaded artifact, commit the -linux.png files, and
      # the next CI run will switch to regression detection automatically.
      - name: Generate Linux baselines (first run)
        if: steps.baselines.outputs.exist == 'false'
        run: npx playwright test --project=visual --update-snapshots

      # Baselines committed: compare and fail on any visual regression.
      - name: Run visual regression tests
        if: steps.baselines.outputs.exist == 'true'
        run: npx playwright test --project=visual

      # Always upload so baselines can be downloaded and committed after
      # the first run, and so diffs are available when regressions are caught.
      - name: Upload visual baselines
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-baselines-linux
          path: web/playwright/visual-baselines/
          retention-days: 30

      - name: Upload visual diff report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # Tier 3: Deeper analysis — slower, highest signal-to-noise
  # ─────────────────────────────────────────────────────────────────────────

  mutation:
    name: Mutation testing (Stryker)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests
        run: npm run test:mutation

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: mutation-report/
          retention-days: 14

  performance:
    name: Performance (k6)
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run smoke test (validates system is up before load)
        run: k6 run performance/tests/smoke-test.js

      - name: Run load test
        run: k6 run performance/tests/load-test.js
